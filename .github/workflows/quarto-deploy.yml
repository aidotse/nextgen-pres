name: Quarto Build and Deploy

# Trigger the workflow on PRs to main, and direct pushes to main
on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

# Required permissions for GitHub Pages deployments
permissions:
  contents: read
  pages: write
  id-token: write

# Prevent concurrent deployments from stepping on each other
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  # --- JOB 1: Test the build on Merge Requests ---
  test-build:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # This official action replaces the entire GitLab 'before_script'
      - name: Setup Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Test Quarto Build
        run: |
          echo "Testing Quarto build..."
          quarto render index.qmd
          echo "✅ Build successful! Safe to merge."

  # --- JOB 2: Deploy to Pages from the main branch ---
  deploy:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Render Production Presentation
        run: |
          echo "Rendering production presentation..."
          quarto render index.qmd

      - name: Package Deployment Files
        run: |
          mkdir public
          mv index.html public/
          mv index_files/ public/
          
          # We use conditional checks here just in case these don't exist yet
          if [ -d "assets" ]; then mv assets/ public/; fi
          if [ -f "style.css" ]; then mv style.css public/; fi

      - name: Setup GitHub Pages
        uses: actions/configure-pages@v4

      - name: Upload Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './public'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4